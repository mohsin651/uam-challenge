MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: '/workspace/miuam_challenge_diff/pretrained'
  IF_LABELSMOOTH: 'on'
  IF_WITH_CENTER: 'no'
  NAME: 'part_attention_vit'
  NO_MARGIN: True
  DEVICE_ID: ('0')
  TRANSFORMER_TYPE: 'vit_large_patch16_224_TransReID'
  STRIDE_SIZE: [16, 16]
  CAM_ADV: True
  NUM_CAMERAS: 3
  CAM_ADV_LAMBDA: 0.1
  CAM_ADV_WEIGHT: 1.0

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]
  DO_FLIP: False           # directional traffic signs — no h-flip
  DO_PAD: True             # padding+random-crop preserved
  PADDING: 10
  # Heavy aug suite (paper's data-centric recipe):
  CJ:
    ENABLED: True
    PROB: 0.5
    BRIGHTNESS: 0.3
    CONTRAST: 0.3
    SATURATION: 0.3
    HUE: 0.1
  REA:
    ENABLED: True
    PROB: 0.5
    MEAN: [123.675, 116.28, 103.53]
  LGT:
    DO_LGT: True
    PROB: 0.5
  PERSPECTIVE:
    ENABLED: False
    PROB: 0.5
    DISTORTION: 0.2        # mild perspective distortion
  ROTATION:
    ENABLED: False
    PROB: 0.5
    DEGREES: 10            # ±10° small rotation

DATASETS:
  TRAIN: ('UrbanElementsReID',)
  TEST: ('UrbanElementsReID_test',)
  ROOT_DIR: '/workspace/Urban2026/'

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8           # process-limit safe (per §77)

SOLVER:
  OPTIMIZER_NAME: 'Adam'
  MAX_EPOCHS: 60
  BASE_LR: 0.00035
  WARMUP_METHOD: 'linear'
  WARMUP_EPOCHS: 10
  WARMUP_FACTOR: 0.01
  IMS_PER_BATCH: 64
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 30    # save ep30 + ep60 only — disk discipline
  LOG_PERIOD: 60
  EVAL_PERIOD: 30
  WEIGHT_DECAY: 1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2
  SEED: 1300
  GRAD_CLIP: 1.0

TEST:
  EVAL: True
  IMS_PER_BATCH: 64
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: True

LOG_ROOT: 'models/'
TB_LOG_ROOT: './tb_log/'
LOG_NAME: './model_vitlarge_camadv_lightaug_seed1300'
