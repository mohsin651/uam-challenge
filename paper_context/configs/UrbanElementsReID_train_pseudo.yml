MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: '/workspace/miuam_challenge_diff/pretrained'
  IF_LABELSMOOTH: 'on'
  IF_WITH_CENTER: 'no'
  NAME: 'part_attention_vit'
  NO_MARGIN: True
  DEVICE_ID: ('0')
  TRANSFORMER_TYPE: 'vit_large_patch16_224_TransReID'
  STRIDE_SIZE: [16, 16]
  # Warm-start fine-tune from the strongest baseline ckpt to preserve
  # learned trafficsignal+others discriminative features. load_param skips
  # 'classifier' keys so the expanded classifier head (1113 + ~N_pseudo IDs)
  # initializes fresh while the backbone+bottleneck inherit trained weights.
  FINETUNE_FROM: '/workspace/miuam_challenge_diff/models/model_vitlarge_256x128_60ep_seed42/part_attention_vit_60.pth'

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  REA:
    ENABLED: False
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]
  LGT:
    DO_LGT: True
    PROB: 0.5

DATASETS:
  TRAIN: ('UrbanElementsReID',)
  TEST: ('UrbanElementsReID_test',)
  ROOT_DIR: '/workspace/Urban2026_pseudo/'

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'Adam'
  MAX_EPOCHS: 10                # short fine-tune; pseudo-labels are noisy, longer = more memorization
  BASE_LR: 0.00003              # 1/10th of base — fine-tune, not retrain
  WARMUP_METHOD: 'linear'
  WARMUP_EPOCHS: 2              # short warmup since base LR is already low
  WARMUP_FACTOR: 0.1
  IMS_PER_BATCH: 64
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 5          # save ep5 and ep10 only
  LOG_PERIOD: 60
  EVAL_PERIOD: 5
  WEIGHT_DECAY: 1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2
  SEED: 900
  GRAD_CLIP: 1.0

TEST:
  EVAL: True
  IMS_PER_BATCH: 64
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: True

LOG_ROOT: 'models/'
TB_LOG_ROOT: './tb_log/'
LOG_NAME: './model_vitlarge_pseudo_seed900'
