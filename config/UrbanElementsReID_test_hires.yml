MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: '/workspace/miuam_challenge_diff/pretrained'
  IF_LABELSMOOTH: 'on'
  IF_WITH_CENTER: 'no'
  NAME: 'part_attention_vit'
  NO_MARGIN: True
  DEVICE_ID: ('0')
  TRANSFORMER_TYPE: 'vit_large_patch16_224_TransReID'
  STRIDE_SIZE: [16, 16]
  DEEP_SUP: False

INPUT:
  SIZE_TRAIN: [384, 192]
  SIZE_TEST: [384, 192]
  REA:
    ENABLED: False
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]
  LGT:
    DO_LGT: True
    PROB: 0.5

DATASETS:
  TRAIN: ('UrbanElementsReID',)
  TEST: ('UrbanElementsReID_test',)
  ROOT_DIR: '/workspace/Urban2026/'

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 0

SOLVER:
  OPTIMIZER_NAME: 'Adam'
  MAX_EPOCHS: 60
  BASE_LR: 0.00035
  WARMUP_METHOD: 'linear'
  WARMUP_EPOCHS: 10
  WARMUP_FACTOR: 0.01
  IMS_PER_BATCH: 32
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 10
  LOG_PERIOD: 60
  EVAL_PERIOD: 10
  WEIGHT_DECAY: 1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2
  SEED: 800

TEST:
  EVAL: True
  IMS_PER_BATCH: 32
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: True

LOG_ROOT: 'models/'
TB_LOG_ROOT: './tb_log/'
LOG_NAME: './model_vitlarge_camadv_hires_seed800'
