MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: '/workspace/miuam_challenge_diff/pretrained'
  IF_LABELSMOOTH: 'on'
  IF_WITH_CENTER: 'no'
  NAME: 'seresnet50'        # NEW backbone — SE-ResNet-50 from timm (last year's paper recipe)
  NO_MARGIN: True            # soft-margin triplet (same as PAT runs)
  DEVICE_ID: ('0')
  PC_LOSS: False            # SE-ResNet-50 has no part tokens — disable Pedal patch loss
  SOFT_LABEL: False         # SOFT_LABEL needs all_posvid from PC_LOSS, disabled together

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PIXEL_MEAN: [0.485, 0.456, 0.406]   # ImageNet stats (timm seresnet50 was trained with these)
  PIXEL_STD: [0.229, 0.224, 0.225]
  DO_FLIP: False             # directional traffic signs (per our findings)
  DO_PAD: True               # padding+random-crop preserved
  PADDING: 10
  # Heavy aug suite from Diaz Benito et al. (URBAN-REID 2024 winning paper, +4.25 mAP from this alone)
  CJ:
    ENABLED: True
    PROB: 0.5
    BRIGHTNESS: 0.3
    CONTRAST: 0.3
    SATURATION: 0.3
    HUE: 0.1
  REA:
    ENABLED: True
    PROB: 0.5
    MEAN: [123.675, 116.28, 103.53]
  LGT:
    DO_LGT: True
    PROB: 0.5
  PERSPECTIVE:
    ENABLED: True
    PROB: 0.5
    DISTORTION: 0.2
  ROTATION:
    ENABLED: True
    PROB: 0.5
    DEGREES: 10

DATASETS:
  TRAIN: ('UrbanElementsReID',)
  TEST: ('UrbanElementsReID_test',)
  ROOT_DIR: '/workspace/Urban2026_merged/'

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'Adam'
  MAX_EPOCHS: 100            # paper used 85-100 epochs for BoT
  BASE_LR: 0.00035           # standard BoT LR
  WARMUP_METHOD: 'linear'
  WARMUP_EPOCHS: 10
  WARMUP_FACTOR: 0.01
  IMS_PER_BATCH: 64
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 20      # save ep20/40/60/80/100
  LOG_PERIOD: 60
  EVAL_PERIOD: 20
  WEIGHT_DECAY: 5e-4         # BoT default (slightly higher than PAT's 1e-4)
  WEIGHT_DECAY_BIAS: 5e-4
  BIAS_LR_FACTOR: 2
  SEED: 2000
  GRAD_CLIP: 1.0

TEST:
  EVAL: True
  IMS_PER_BATCH: 64
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: True

LOG_ROOT: 'models/'
TB_LOG_ROOT: './tb_log/'
LOG_NAME: './model_seresnet50_merged_seed2000'
