MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: '/workspace/miuam_challenge_diff/pretrained'
  IF_LABELSMOOTH: 'on'
  IF_WITH_CENTER: 'no'
  NAME: 'part_attention_vit'
  NO_MARGIN: True
  DEVICE_ID: ('0')
  TRANSFORMER_TYPE: 'vit_large_patch14_eva_TransReID'
  STRIDE_SIZE: [14, 14]

INPUT:
  SIZE_TRAIN: [224, 112]
  SIZE_TEST: [224, 112]
  REA:
    ENABLED: False
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]
  LGT:
    DO_LGT: True
    PROB: 0.5

DATASETS:
  TRAIN: ('UrbanElementsReID',)
  TEST: ('UrbanElementsReID_test',)
  ROOT_DIR: '/workspace/Urban2026/'

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'Adam'
  MAX_EPOCHS: 60
  BASE_LR: 0.0001
  WARMUP_METHOD: 'linear'
  WARMUP_EPOCHS: 10
  WARMUP_FACTOR: 0.01
  IMS_PER_BATCH: 64
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 10
  LOG_PERIOD: 60
  EVAL_PERIOD: 10
  WEIGHT_DECAY: 1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2
  SEED: 77

TEST:
  EVAL: True
  IMS_PER_BATCH: 64
  RE_RANKING: True
  WEIGHT: '/workspace/miuam_challenge_diff/models/model_eva_large_p14_seed77/part_attention_vit_60.pth'
  NECK_FEAT: 'before'
  FEAT_NORM: True

LOG_ROOT: 'models/'
TB_LOG_ROOT: './tb_log/'
LOG_NAME: './model_eva_large_p14_seed77'
