MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: '/workspace/miuam_challenge_diff/pretrained'
  IF_LABELSMOOTH: 'on'
  IF_WITH_CENTER: 'no'
  NAME: 'part_attention_vit'
  NO_MARGIN: True
  DEVICE_ID: ('0')
  TRANSFORMER_TYPE: 'vit_large_patch14_eva_TransReID'
  STRIDE_SIZE: [14, 14]

INPUT:
  SIZE_TRAIN: [224, 112]      # 16*14 by 8*14 → 128 tokens, same mem envelope as ViT-L baseline
  SIZE_TEST: [224, 112]
  REA:
    ENABLED: False
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]
  LGT:
    DO_LGT: True
    PROB: 0.5

DATASETS:
  TRAIN: ('UrbanElementsReID',)
  TEST: ('UrbanElementsReID_test',)
  ROOT_DIR: '/workspace/Urban2026/'      # challenge-only

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'Adam'
  MAX_EPOCHS: 2
  BASE_LR: 0.0001                        # lower LR — standard for MIM-distilled backbones; DINOv2's 3.5e-4 blew up
  WARMUP_METHOD: 'linear'
  WARMUP_EPOCHS: 10
  WARMUP_FACTOR: 0.01
  IMS_PER_BATCH: 64
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 1
  LOG_PERIOD: 30
  EVAL_PERIOD: 1
  WEIGHT_DECAY: 1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2
  SEED: 77
  GRAD_CLIP: 1.0                         # safety net: AMP loss-scaler doesn't catch all NaN grads

TEST:
  EVAL: True
  IMS_PER_BATCH: 64
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: True

LOG_ROOT: 'models/'
TB_LOG_ROOT: './tb_log/'
LOG_NAME: './_eva_smoke'
